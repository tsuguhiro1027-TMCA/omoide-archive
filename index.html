<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思い出アーカイブ | 街角エントランス</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- デザインの基盤 --- */
        :root {
            --sepia-dark: #2b231a;
            --sepia-paper: #f1e4d3;
            --gold-muted: #c3a168;
            --brick: #8c4a32;
            --radio-brown: #3e2723;
            --clock-blue: #1a2a3a;
        }

        body {
            background-color: var(--sepia-dark);
            color: var(--sepia-paper);
            font-family: 'Shippori Mincho', 'serif', "游明朝", serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* フィルムノイズ */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
        }

        .portal-container {
            text-align: center;
            z-index: 10;
            padding: 40px 0;
            width: 100%;
        }

        header { margin-bottom: 50px; }
        h1 {
            font-size: 3rem;
            letter-spacing: 0.3em;
            color: var(--gold-muted);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }
        .welcome-msg { font-size: 1.1rem; margin-top: 15px; opacity: 0.8; }

        .portal-choices {
            display: flex;
            justify-content: center;
            gap: 25px;
            perspective: 1000px;
            flex-wrap: wrap;
        }

        .shop-card {
            width: 280px;
            height: 400px;
            cursor: pointer;
            transition: 0.5s ease-out;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* 各カードの背景 */
        .movie-theater {
            background: 
                linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
                repeating-linear-gradient(45deg, var(--brick), var(--brick) 10px, #7a3e29 10px, #7a3e29 20px);
            border: 4px solid #5a3a2a;
        }

        .photo-studio {
            background: 
                linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
                linear-gradient(to right, #6f4e37, #5d3f2c);
            border: 4px solid #4a3222;
        }

        .radio-station {
            background: 
                linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
                repeating-linear-gradient(45deg, var(--radio-brown), var(--radio-brown) 10px, #2b1d15 10px, #2b1d15 20px);
            border: 4px solid #2b1d15;
        }

        .clock-tower {
            background: 
                linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
                repeating-linear-gradient(0deg, var(--clock-blue), var(--clock-blue) 20px, #101820 20px, #101820 40px);
            border: 4px solid #1a2a3a;
        }

        .shop-card:hover {
            transform: scale(1.05) translateZ(20px);
            box-shadow: 0 30px 60px rgba(195, 161, 104, 0.5);
        }

        .shop-sign {
            font-size: 1.6rem;
            color: var(--sepia-paper);
            margin-top: 30px;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px var(--gold-muted);
        }

        .card-icon {
            font-size: 5.5rem;
            margin-top: 50px;
            color: var(--gold-muted);
            transition: 0.5s;
            filter: drop-shadow(0 0 10px var(--gold-muted));
        }
        .shop-card:hover .card-icon {
            color: #fff;
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #fff);
        }

        .card-desc {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.7;
            padding: 0 20px;
            box-sizing: border-box;
            line-height: 1.5;
        }

        /* ロゴとフッター */
        .company-logo-container { margin-top: 40px; }
        .company-logo {
            max-width: 120px;
            opacity: 0.6;
            filter: sepia(0.5);
        }
        footer { margin-top: 20px; font-size: 0.75rem; opacity: 0.4; font-style: italic; }

        /* アカウントボタン */
        .account-btn-fixed {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
        }
        .account-btn {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--gold-muted);
            color: var(--gold-muted);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            transition: 0.3s;
        }
        .account-btn:hover { background: var(--gold-muted); color: #000; }
        .avatar-circle {
            width: 24px; height: 24px; background: var(--gold-muted); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-weight: bold; font-size: 12px;
        }

        /* --- ★モバイル対応（スマホ用レイアウト）★ --- */
        @media screen and (max-width: 768px) {
            .portal-container {
                padding: 80px 0 40px 0; /* 上部にアカウントボタン用の余白を確保 */
            }
            h1 {
                font-size: 2rem; /* スマホ画面に合わせてタイトルを少し小さく */
                letter-spacing: 0.1em;
            }
            .welcome-msg {
                font-size: 0.95rem;
                padding: 0 15px;
            }
            .portal-choices {
                flex-direction: column; /* 横並びから「縦並び」に変更 */
                align-items: center;
                gap: 20px;
            }
            .shop-card {
                width: 90%; /* 画面幅の90%まで広げる */
                max-width: 350px;
                height: 250px; /* 縦幅を少し低くして、スクロールしやすくする */
            }
            .card-icon {
                margin-top: 20px;
                font-size: 4rem; /* アイコンもスマホに合わせて調整 */
            }
            .shop-sign {
                margin-top: 15px;
                font-size: 1.4rem;
            }
            .card-desc {
                bottom: 15px;
                font-size: 0.8rem;
            }
            /* アカウントボタンが邪魔にならないよう少し小さく */
            .account-btn-fixed {
                top: 10px;
                right: 10px;
            }
            .account-btn {
                padding: 8px 15px;
                font-size: 0.85rem;
            }
            .avatar-circle {
                width: 20px; height: 20px; font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="account-btn-fixed">
        <button class="account-btn" onclick="location.href='account.html'">
            <div class="avatar-circle">M</div>
            <span>宮城 ユーザー</span>
        </button>
    </div>

    <div class="portal-container">
        <header>
            <h1>思い出アーカイブ</h1>
            <p class="welcome-msg">あの日の物語が、街角の灯りとして蘇る。</p>
        </header>

        <div class="portal-choices">
            <div class="shop-card movie-theater" onclick="location.href='theater_lobby.html'">
                <div class="shop-sign">思い出の映画館</div>
                <div class="card-icon">🎞️</div>
                <p class="card-desc">懐かしいホームビデオ・映像作品は、こちらからご覧ください。</p>
            </div>

            <div class="shop-card photo-studio" onclick="location.href='photo_lobby.html'">
                <div class="shop-sign">思い出の写真館</div>
                <div class="card-icon">📷</div>
                <p class="card-desc">大切に保管されたお写真・アルバムは、こちらからご覧ください。</p>
            </div>

            <div class="shop-card radio-station" onclick="location.href='radio_room.html'">
                <div class="shop-sign">時のラジオ局</div>
                <div class="card-icon">📻</div>
                <p class="card-desc">ノイズの向こう側に、懐かしい声が待っています。</p>
            </div>

            <div class="shop-card clock-tower" onclick="location.href='history_timeline.html'">
                <div class="shop-sign">思い出の時計塔</div>
                <div class="card-icon">🕰️</div>
                <p class="card-desc">すべての記憶を一本の道に。家族の歩みを時系列で辿ります。</p>
            </div>
        </div>

        <div class="company-logo-container">
            <img src="common_images/Nansei.jpg" alt="弊社ロゴ" class="company-logo">
        </div>

        <footer>
            Digital Heritage Theater — 昭和の記憶を未来へ語り継ぐ、街角のアーカイブ。
        </footer>
    </div>

    <script>
        // ログインチェック：未ログインならlogin.htmlに戻す
        const userId = sessionStorage.getItem('user_id');
        if (!userId) {
            window.location.href = 'login.html';
        }

        // アカウントボタンにログイン者の名前を表示
        const userName = sessionStorage.getItem('user_name');
        if (userName) {
            const nameEl = document.querySelector('.account-btn span');
            const avatarEl = document.querySelector('.avatar-circle');
            if (nameEl) nameEl.textContent = userName;
            if (avatarEl) avatarEl.textContent = userName.charAt(0);
        }
    </script>
</body>
</html>

</body>
</html>
