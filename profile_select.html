<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール選択 | 思い出アーカイブ</title>
    <style>
        :root {
            --gold: #d4af37;
            --sepia-dark: #2b231a;
            --sepia-paper: #f1e4d3;
        }

        body {
            background-color: var(--sepia-dark);
            color: var(--sepia-paper);
            font-family: 'serif', "游明朝", serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .selector-container {
            text-align: center;
            z-index: 10;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.2em;
            margin-bottom: 50px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .profile-list {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .profile-item {
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .avatar-frame {
            width: 120px;
            height: 120px;
            background: #1a1510;
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-item:hover {
            transform: scale(1.1) translateY(-10px);
        }
        .profile-item:hover .avatar-frame {
            box-shadow: 0 0 30px var(--gold);
            background: var(--gold);
            color: #000;
        }

        .profile-name {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        .admin-badge {
            position: absolute;
            top: 5px; right: 5px;
            font-size: 0.6rem;
            background: var(--gold);
            color: #000;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .manage-link {
            margin-top: 60px;
            font-size: 0.9rem;
            opacity: 0.5;
            cursor: pointer;
            transition: 0.3s;
        }
        .manage-link:hover { opacity: 1; color: var(--gold); }

        /* ローディング表示 */
        .loading {
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            opacity: 0.7;
        }

        /* エラー表示 */
        .error-msg {
            color: #ff6b6b;
            font-size: 1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="selector-container">
        <h1>どなたが思い出に会いに来ましたか？</h1>
        <div class="profile-list" id="profileList">
            <div class="loading">読み込み中...</div>
        </div>
        <div class="manage-link">プロフィールの追加・編集（最大4名まで）</div>
    </div>

    <script>
        // ★ここにGASのURLを貼り付けてください★
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyjhEdmWnWi5QkS-KKY-g-oH6OcktgnFBItjIuIejsJFkvRVjEmpxRm-ui2q5lLz6cPMw/exec';

        // ログインしていない場合はlogin.htmlに戻す
        const userId = sessionStorage.getItem('user_id');
        if (!userId) {
            window.location.href = 'login.html';
        }

        // GASからプロフィール一覧を取得
        async function loadProfiles() {
            const list = document.getElementById('profileList');

            try {
                const res = await fetch(`${GAS_URL}?action=getProfiles&user_id=${encodeURIComponent(userId)}`);
                const data = await res.json();

                if (data.status === 'ok' && data.profiles.length > 0) {
                    list.innerHTML = '';
                    data.profiles.forEach(profile => {
                        const item = document.createElement('div');
                        item.className = 'profile-item';
                        item.onclick = () => selectProfile(profile.profile_name);
                        item.innerHTML = `
                            <div class="avatar-frame">
                                ${profile.is_admin === true || profile.is_admin === 'TRUE'
                                    ? '<span class="admin-badge">主契約者</span>' : ''}
                                ${profile.emoji}
                            </div>
                            <div class="profile-name">${profile.profile_name}</div>
                        `;
                        list.appendChild(item);
                    });
                } else {
                    list.innerHTML = '<div class="error-msg">プロフィールが見つかりませんでした</div>';
                }
            } catch (err) {
                list.innerHTML = '<div class="error-msg">読み込みに失敗しました。再度ログインしてください。</div>';
            }
        }

        function selectProfile(name) {
            sessionStorage.setItem('profile_name', name);
            window.location.href = 'index.html';
        }

        // ページ読み込み時にプロフィールを取得
        loadProfiles();
    </script>
</body>
</html>
