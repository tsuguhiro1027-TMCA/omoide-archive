<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思い出の映画館 | 上映中</title>
    <style>
        :root {
            --gold-bright: #e5c185;
            --gold-muted: #c3a168;
            --gold-dark: #8c6d31;
        }

        body {
            background-color: #000; color: #eee; text-align: center;
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'serif', "游明朝", serif;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
            cursor: default;
        }

        #doorOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            overflow: hidden; pointer-events: auto; perspective: 1000px;
        }
        .door-half {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: radial-gradient(circle at center, #5a0000 0%, #2a0000 100%);
            border: 10px solid #1a0000;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
            transition: transform 2.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
            backface-visibility: hidden;
        }
        .door-half::after {
            content: ''; position: absolute;
            top: 10%; bottom: 10%; left: 15%; right: 15%;
            border: 2px solid var(--gold-dark); opacity: 0.5;
        }
        .door-left { left: 0; transform-origin: left center; border-right: 3px solid #000; }
        .door-right { right: 0; transform-origin: right center; border-left: 3px solid #000; }
        .door-handle {
            position: absolute; top: 50%; width: 25px; height: 160px;
            background: linear-gradient(to right, var(--gold-bright), var(--gold-dark), var(--gold-bright));
            border-radius: 5px; box-shadow: 5px 5px 20px rgba(0,0,0,0.8);
            transform: translateY(-50%); z-index: 10;
        }
        .door-left .door-handle { right: 20px; }
        .door-right .door-handle { left: 20px; }
        .entrance-box {
            position: relative; z-index: 10000; text-align: center;
            background: rgba(0,0,0,0.9); padding: 50px 70px; border-radius: 2px;
            border: 3px double var(--gold-dark); box-shadow: 0 0 50px rgba(0,0,0,1);
            transition: opacity 0.8s ease;
        }
        .entrance-title { color: var(--gold-bright); font-size: 1.4rem; letter-spacing: 0.5em; margin-bottom: 35px; border-bottom: 1px solid var(--gold-dark); padding-bottom: 15px; }
        .enter-btn {
            background: transparent; border: 1px solid var(--gold-bright); color: var(--gold-bright);
            padding: 18px 50px; font-size: 1.6rem; cursor: pointer; font-family: serif;
            letter-spacing: 0.4em; transition: 0.4s;
        }
        .enter-btn:hover { background: var(--gold-bright); color: #000; }
        #doorOverlay.is-open .door-left { transform: translateZ(200px) rotateY(-95deg); }
        #doorOverlay.is-open .door-right { transform: translateZ(200px) rotateY(95deg); }
        #doorOverlay.is-open .entrance-box { opacity: 0; pointer-events: none; }
        #doorOverlay.is-hidden { pointer-events: none; }

        .theater-architecture {
            position: relative; width: 100%; flex: 1; perspective: 2000px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden;
        }
        .reveal-ui { opacity: 0; transition: opacity 0.6s ease; }
        .is-visible { opacity: 1; }
        .title-area { position: absolute; top: 6%; z-index: 35; }
        h1 { font-size: 1.1rem; margin: 0; letter-spacing: 0.3em; color: var(--gold-bright); opacity: 0.6; }

        .screen-container {
            position: relative; width: 75%; max-width: 950px; z-index: 10;
            transform: rotateX(5deg); box-shadow: 0 30px 100px rgba(0,0,0,1);
            border-radius: 5px; overflow: hidden; border: 4px solid #111; background: #000;
        }
        .screen-container iframe {
            width: 100%; aspect-ratio: 16/9; border: none; display: block;
        }

        .control-panel {
            margin-top: 30px; display: flex; flex-direction: column; gap: 15px;
            z-index: 50; padding: 20px 40px;
            background: linear-gradient(145deg, #222, #000);
            border: 2px solid var(--gold-dark); border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,1); width: 85%; max-width: 850px;
            transition: opacity 0.6s ease;
        }
        .button-row { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .retro-btn {
            background: transparent; border: none; color: var(--gold-muted);
            cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.3s;
            text-decoration: none;
        }
        .retro-btn i {
            font-size: 1.2rem; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--gold-dark); border-radius: 50%;
            background: #111; color: var(--gold-bright);
        }
        .retro-btn span { font-size: 0.65rem; font-weight: bold; color: var(--gold-muted); }
        .retro-btn:hover { color: var(--gold-bright); transform: translateY(-2px); }

        body.is-fullscreen .screen-container {
            width: 100vw; max-width: 100vw; height: 100vh;
            transform: none; border: none; border-radius: 0; box-shadow: none;
        }
        body.is-fullscreen .screen-container iframe {
            width: 100%; height: 100%; aspect-ratio: unset;
        }
        body.is-fullscreen .control-panel {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 950px;
            background: rgba(15,15,15,0.7); backdrop-filter: blur(8px); z-index: 9999;
        }
        body.is-fullscreen .title-area {
            position: fixed; top: 30px; left: 0; width: 100%; z-index: 9999;
        }

        @media screen and (max-width: 768px) {
            .entrance-box { padding: 30px 20px; width: 85%; box-sizing: border-box; }
            .entrance-title { font-size: 1.1rem; margin-bottom: 20px; }
            .enter-btn { padding: 12px 30px; font-size: 1.1rem; }
            .title-area { top: 2%; }
            h1 { font-size: 0.8rem; }
            .screen-container { width: 95%; transform: rotateX(2deg); }
            .control-panel { width: 95%; padding: 15px; box-sizing: border-box; }
            .button-row { flex-wrap: wrap; gap: 15px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body id="theaterBody">

    <div id="doorOverlay">
        <div class="door-half door-left"><div class="door-handle"></div></div>
        <div class="door-half door-right"><div class="door-handle"></div></div>
        <div class="entrance-box">
            <div class="entrance-title">THEATER ROOM</div>
            <p style="color: var(--gold-muted); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 0.1em;">
                ご案内作品：<br>
                <span id="doorTitle" style="color: var(--gold-bright); font-size: 1.2rem; font-weight: bold;">---</span>
            </p>
            <button class="enter-btn" onclick="enterTheater()">入場する</button>
        </div>
    </div>

    <div class="theater-architecture">
        <div class="title-area reveal-ui" id="uiTitle">
            <h1>上映作品：<span id="displayTitle">---</span></h1>
        </div>

        <div class="screen-container" id="screenContainer"></div>

        <div class="control-panel reveal-ui" id="uiControls">
            <div class="button-row">
                <a class="retro-btn" id="downloadBtn" href="#" download>
                    <i class="fas fa-file-download"></i>
                    <span>保存する</span>
                </a>
                <button class="retro-btn" onclick="toggleFullScreen()">
                    <i class="fas fa-expand" id="fullscreenIcon"></i>
                    <span id="fullscreenText">全画面</span>
                </button>
                <button class="retro-btn" onclick="location.href='theater_lobby.html'">
                    <i class="fas fa-undo"></i>
                    <span>ロビーへ戻る</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyjhEdmWnWi5QkS-KKY-g-oH6OcktgnFBItjIuIejsJFkvRVjEmpxRm-ui2q5lLz6cPMw/exec';

        // ログインチェック
        const userId = sessionStorage.getItem('user_id');
        if (!userId) window.location.href = 'login.html';

        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('file_id');
        const videoTitle = urlParams.get('title') ? decodeURIComponent(urlParams.get('title')) : '思い出の映像';

        document.getElementById('displayTitle').innerText = videoTitle;
        document.getElementById('doorTitle').innerText = videoTitle;
        document.title = `${videoTitle} | 思い出の映画館`;

        // iframeで再生 + ダウンロードリンクを設定
        if (fileId) {
            document.getElementById('screenContainer').innerHTML = `
                <iframe src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" allowfullscreen></iframe>
            `;
            // ダウンロードボタンのリンクを設定
            document.getElementById('downloadBtn').href = 
                `https://drive.google.com/uc?export=download&id=${fileId}`;
        }

        const doorOverlay = document.getElementById('doorOverlay');
        const uiTitle = document.getElementById('uiTitle');
        const uiControls = document.getElementById('uiControls');
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        const fullscreenText = document.getElementById('fullscreenText');
        const bodyElement = document.body;

        let uiTimeout;
        function showUI() {
            uiTitle.classList.add('is-visible');
            uiControls.classList.add('is-visible');
            bodyElement.style.cursor = 'default';
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(hideUI, 4000);
        }
        function hideUI() {
            uiTitle.classList.remove('is-visible');
            uiControls.classList.remove('is-visible');
            bodyElement.style.cursor = 'none';
        }

        document.addEventListener('mousemove', showUI);
        document.addEventListener('click', showUI);
        document.addEventListener('touchstart', showUI);

        function playBuzzer() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 2.5);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 2.5);
            } catch(e) {}
        }

        function enterTheater() {
            playBuzzer();
            doorOverlay.classList.add('is-open');
            setTimeout(() => { showUI(); }, 1000);
            setTimeout(() => { doorOverlay.classList.add('is-hidden'); }, 3000);
        }

        function toggleFullScreen() {
            const doc = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenIcon.className = 'fas fa-compress';
                fullscreenText.innerText = '元に戻す';
                bodyElement.classList.add('is-fullscreen');
            } else {
                fullscreenIcon.className = 'fas fa-expand';
                fullscreenText.innerText = '全画面';
                bodyElement.classList.remove('is-fullscreen');
            }
        });
    </script>
</body>
</html>
